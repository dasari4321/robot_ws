ekf_filter_node:
  ros__parameters:
    # ... your existing frames ...
    two_d_mode: false  # Correct: must be false for ramps

    # Wheel Odometry (from Gazebo)
    odom0: /odom
    odom0_config: [false, false, false, # Position
                   false, false, false, # Orientation
                   true,  true,  false, # X/Y Velocity (Added Y for slip)
                   false, false, true,  # Roll/Pitch/Yaw Velocity
                   false, false, false]
    odom0_differential: false

    # IMU: Crucial for detecting the "Tilt" on the ramp
    imu0: /imu
    imu0_config: [false, false, false,
                  true,  true,  true,   # Enable Roll and Pitch (crucial for ramps!)
                  false, false, false,
                  true,  true,  true,   # Angular velocities
                  true,  false,  false] # Linear acceleration (X only)
    imu0_differential: false # Set to false to use absolute orientation from IMU

    # Visual Odometry (from rtabmap_odom)
    odom1: /vo
    odom1_config: [true,  true,  true,   # Enable Z position (Height!)
                   true,  true,  true,   # Enable Roll/Pitch/Yaw
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false