### ekf_node config for ackermann_robot ###
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_acceleration: true
    publish_tf: true
    use_sim_time: true
    dynamic_process_noise_covariance: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false

    imu0: /imu
    imu0_config: [false, false, false,
                  false,  false,  true,
                  false, false, false,
                  false,  false,  true,
                  true,  false,  false]
    imu0_differential: true

    use_control: false

    # odom1: /visual_odom
    # odom1_config: [true,  true,  false,
    #                false, false, true,
    #                false, false, false,
    #                false, false, false,
    #                false, false, false]
    # odom1_differential: false